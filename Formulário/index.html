<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de entrada</title>
</head>
<body>

<h2>CADASTRO DO USUÁRIO</h2>

<form>

<label>INDIVIDUAL</label>
<input type="checkbox">

<label>GRUPO TERAPÊUTICO</label>
<input type="checkbox">

<label>DATA:</label>
<input type="date">

<br><br>

<h3>1 - IDENTIFICAÇÃO</h3>

<label>NOME:</label><br>
<input type="text" size="100">

<br><br>

<label>CPF:</label>
<input type="text" size="35" maxlength="11">

<label>RG:</label>
<input type="text" size="35" maxlength="10">

<br><br>

<label>ENDEREÇO:</label><br>
<input type="text" size="100">

<br><br>

<label>Nº:</label>
<input type="text" size="10">

<label>BAIRRO:</label>
<input type="text" size="40">

<label>CEP:</label>
<input type="text" size="20">

<br><br>

<label>TELEFONE:</label>
<input type="text" size="30">

<label>EMAIL:</label>
<input type="email" size="40">

<br><br>

<label>DATA DE NASCIMENTO:</label>
<input type="date">

<label>IDADE:</label>
<input type="number" size="5">

<label>GÊNERO:</label>
<input type="text" size="20">

<br><br>

<label>ESCOLARIDADE:</label>
<input type="text" size="35">

<label>PROFISSÃO:</label>
<input type="text" size="35">

<br><br>

<label>NATURALIDADE:</label>
<input type="text" size="35">

<label>ESTADO CIVIL:</label>
<input type="text" size="35">

<label>RELIGIÃO:</label>
<input type="text" size="20">

<br><br>

<label>ALUNO UNIME:</label>

<label>Não</label>
<input type="radio" name="aluno">

<label>Sim</label>
<input type="radio" name="aluno">

<br><br>

<label>CURSO:</label>
<input type="text" size="40">

<label>SEM:</label>
<input type="text" size="10">

<label>TURMA:</label>
<input type="text" size="10">

<br><br><br>

<h3>2 - DADOS SOBRE A FAMÍLIA</h3>

<label>NOME DO PAI:</label>
<input type="text" size="50">

<label>IDADE:</label>
<input type="number">

<br><br>

<label>PROFISSÃO:</label>
<input type="text" size="35">

<label>ESCOLARIDADE:</label>
<input type="text" size="35">

<br><br>

<label>NOME DA MÃE:</label>
<input type="text" size="50">

<label>IDADE:</label>
<input type="number">

<br><br>

<label>PROFISSÃO:</label>
<input type="text" size="35">

<label>ESCOLARIDADE:</label>
<input type="text" size="35">

<br><br>

<label>RENDA FAMILIAR:</label>

<label>Até 2 salários mínimos</label>
<input type="radio" name="renda">

<label>Mais que 2 salários mínimos</label>
<input type="radio" name="renda">

<br><br>

<label>RESPONSÁVEL PRESENTE NA TRIAGEM:</label><br>
<input type="text" size="80">

<br><br>

<input type="submit" value="Enviar">

<label for="senha">Senha:</label>

</form>

</body>
</html>
